<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yearly Gantt Planner | 1年を俯瞰する工程管理</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <header>
            <div class="header-content">
                <h1>Yearly Gantt Planner 2026</h1>
                <p style="color: var(--text-dim); font-size: 0.8rem;">週単位のプロジェクトスケジュール</p>
            </div>
            <div class="controls">
                <button id="btn-add-task" class="btn-primary">
                    <i data-lucide="plus"></i> 項目を追加
                </button>
            </div>
        </header>

        <main id="gantt-wrapper">
            <div class="gantt-container">
                <!-- Timeline Header -->
                <div class="timeline-header" id="timeline-header">
                    <div class="task-info-header">
                        <div class="col-crop">作物</div>
                        <div class="col-task">作業項目</div>
                    </div>
                    <div class="months-row" id="months-row">
                        <!-- 月と週がJSで生成されます -->
                    </div>
                </div>

                <!-- Rows Content -->
                <div id="gantt-rows-container">
                    <!-- タスク行がJSで生成されます -->
                </div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="modal-overlay" class="hidden">
        <div class="modal glass">
            <h2 id="modal-title">項目の設定</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label>作物名 (大分類 - 例: トマト)</label>
                    <input type="text" id="task-crop" placeholder="例: トマト">
                </div>
                <div class="form-group">
                    <label>作業項目 (行の名前 - 例: 育苗、収穫)</label>
                    <input type="text" id="task-name" placeholder="例: 育苗">
                </div>
                <div class="form-group">
                    <label>タスクの形式</label>
                    <select id="task-type">
                        <option value="period">期間 (〇月〇日 〜 〇月〇日)</option>
                        <option value="deadline">締切 (〇月〇日 までにやる)</option>
                        <option value="sequential">連続 (完了後に次のステップが出現)</option>
                    </select>
                </div>

                <!-- 通常タスク用入力 -->
                <div id="normal-task-inputs">
                    <div class="form-group">
                        <label id="subname-label">作業内容 (具体的なタスク名)</label>
                        <input type="text" id="task-subname" placeholder="例: 播種、水やりなど">
                    </div>
                    <div class="form-group" id="date-inputs-grid"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div id="start-date-container">
                            <label>開始日</label>
                            <input type="date" id="task-start">
                        </div>
                        <div>
                            <label id="end-date-label">終了日</label>
                            <input type="date" id="task-end">
                        </div>
                    </div>
                </div>

                <!-- 連続型タスク用入力 -->
                <div id="sequential-task-inputs" style="display: none;">
                    <div class="form-group">
                        <label>開始日 (最初のタスクが始まる日)</label>
                        <input type="date" id="seq-start-date">
                    </div>
                    <div class="form-group" style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                        <label>各ステップと締切日</label>
                        <div id="seq-steps-container"
                            style="display: flex; flex-direction: column; gap: 8px; margin-top:8px;">
                            <!-- JSでステップ入力が動的に追加される -->
                        </div>
                        <button type="button" id="btn-add-seq-step"
                            style="margin-top: 12px; padding: 6px 10px; background: rgba(56, 189, 248, 0.15); color: var(--primary); border: 1px dashed var(--primary); border-radius: 4px; cursor: pointer; width: 100%;">+
                            ステップを追加</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>進捗状況</label>
                    <select id="task-progress">
                        <option value="0">未完了 (Todo)</option>
                        <option value="100">完了 (Done - 色が変わります)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btn-delete" class="btn-delete hidden">削除</button>
                    <button type="button" id="btn-cancel" class="btn-cancel">キャンセル</button>
                    <button type="submit" class="btn-primary">保存する</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
